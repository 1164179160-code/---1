<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>蓝莓骑行 · 高端山地车</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#050505;
  font-family:'PingFang SC','SF Pro Display','Helvetica Neue',sans-serif;
  color:#fff;cursor:grab;user-select:none;
  -webkit-font-smoothing:antialiased;
}
body:active{cursor:grabbing}
body.locked{cursor:default}

/* ===== 顶栏 ===== */
.bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:20px 32px;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(rgba(5,5,5,0.9) 60%,transparent);
  pointer-events:none;
}
.bar>*{pointer-events:auto}
.logo{font-size:12px;letter-spacing:4px;font-weight:300;opacity:0.7}
.logo b{font-weight:700;opacity:1}
.views{display:flex;gap:6px}
.views button{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.35);padding:5px 14px;border-radius:100px;
  font-size:10px;cursor:pointer;letter-spacing:1.5px;transition:all 0.4s;
  font-family:inherit;text-transform:uppercase;
}
.views button:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.18)}
.views button.on{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.22)}

/* ===== 3D 场景 ===== */
.scene{
  width:100vw;height:100vh;perspective:1100px;
  display:flex;align-items:center;justify-content:center;
}
.rig{
  position:relative;transform-style:preserve-3d;
  width:0;height:0;
}

/* ===== 卡片 ===== */
.card{
  position:absolute;width:200px;height:290px;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(0.16,1,0.3,1),opacity 0.8s;
  cursor:pointer;border-radius:10px;overflow:hidden;
  background:#111;will-change:transform;
}
.card::before{
  content:'';position:absolute;inset:0;z-index:2;border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  transition:border-color 0.4s,box-shadow 0.4s;pointer-events:none;
}
.card:hover::before{
  border-color:rgba(255,255,255,0.18);
  box-shadow:0 0 40px rgba(255,255,255,0.04),inset 0 0 40px rgba(255,255,255,0.02);
}
.card img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);
}
.card:hover img{transform:scale(1.06)}
.card .info{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  padding:16px 14px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
}
.card .info h3{font-size:13px;font-weight:600;margin-bottom:2px}
.card .info p{font-size:9px;color:rgba(255,255,255,0.4);font-weight:300;letter-spacing:0.3px}
.card .tag{
  position:absolute;top:10px;left:10px;z-index:3;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:3px 8px;border-radius:4px;font-size:8px;color:rgba(255,255,255,0.7);
  letter-spacing:1px;text-transform:uppercase;
}
.card .price{
  position:absolute;top:10px;right:10px;z-index:3;
  font-size:11px;font-weight:600;text-shadow:0 1px 8px rgba(0,0,0,0.7);
}
.card .shine{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 50%);
  opacity:0;transition:opacity 0.4s;
}
.card:hover .shine{opacity:1}

/* ===== 详情页 ===== */
.detail{
  position:fixed;inset:0;z-index:300;background:#050505;
  transform:translateY(100%);transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);
  overflow-y:auto;overflow-x:hidden;
}
.detail.open{transform:translateY(0)}
.detail .close{
  position:fixed;top:20px;right:28px;z-index:310;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;font-family:inherit;
}
.detail .close:hover{background:rgba(255,255,255,0.15);transform:rotate(90deg)}
.detail .hero{width:100%;height:75vh;position:relative;overflow:hidden}
.detail .hero img{
  width:100%;height:100%;object-fit:cover;
  animation:zoomIn 6s ease-out forwards;
}
@keyframes zoomIn{from{transform:scale(1.12);opacity:0.8}to{transform:scale(1);opacity:1}}
.detail .hero .fade{
  position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(transparent,#050505);
}
.detail .body{max-width:640px;margin:-90px auto 0;position:relative;z-index:2;padding:0 24px 80px}
.detail .body h1{font-size:32px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.detail .body .sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px;font-weight:300}
.detail .body .price-lg{font-size:24px;font-weight:700;margin-bottom:28px}
.detail .body .grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:rgba(255,255,255,0.05);border-radius:14px;overflow:hidden;margin-bottom:36px;
}
.detail .body .cell{background:#050505;padding:18px 16px}
.detail .body .cell label{font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px}
.detail .body .cell span{font-size:13px;font-weight:500}
.detail .body .btn{
  display:inline-block;background:#fff;color:#050505;
  padding:13px 44px;border-radius:100px;font-size:13px;font-weight:600;
  letter-spacing:1px;text-decoration:none;transition:transform 0.2s,box-shadow 0.3s;
}
.detail .body .btn:hover{transform:scale(1.03);box-shadow:0 4px 30px rgba(255,255,255,0.1)}

/* ===== 底部提示 ===== */
.hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;
  color:rgba(255,255,255,0.12);font-size:9px;letter-spacing:4px;text-transform:uppercase;
}

/* ===== 环境光 ===== */
.glow{
  position:fixed;pointer-events:none;z-index:0;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(20,40,80,0.06),transparent 60%);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.glow2{
  position:fixed;pointer-events:none;z-index:0;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(60,20,80,0.04),transparent 60%);
  top:30%;left:60%;transform:translate(-50%,-50%);
}
</style>
</head>
<body>
<div class="glow"></div><div class="glow2"></div>

<div class="bar">
  <div class="logo"><b>蓝莓骑行</b> &nbsp;PREMIUM MTB</div>
  <div class="views" id="views">
    <button class="on" data-m="ring">环形</button>
    <button data-m="grid">网格</button>
    <button data-m="helix">螺旋</button>
    <button data-m="flat">展开</button>
  </div>
</div>

<div class="scene"><div class="rig" id="rig"></div></div>

<div class="detail" id="detail">
  <button class="close" id="closeBtn">✕</button>
  <div class="hero"><img id="dI" src=""><div class="fade"></div></div>
  <div class="body">
    <h1 id="dT"></h1><div class="sub" id="dS"></div>
    <div class="price-lg" id="dP"></div>
    <div class="grid" id="dG"></div>
    <a class="btn" href="#">立即预约试骑</a>
  </div>
</div>

<div class="hint">drag to rotate · scroll to zoom · click to explore</div>
<script>
var data=[
  {img:'https://images.unsplash.com/photo-1544191696-102dbdaeeaa0?w=700&q=85',t:'TREK Fuel EX 9.9',s:'全碳纤维 · 山地越野旗舰',tag:'ENDURO',p:'¥68,800',sp:[['车架','OCLV Mountain 碳纤维'],['前叉','Fox Factory 36 160mm'],['变速','SRAM XX1 Eagle AXS'],['轮组','Bontrager Line Elite 30'],['刹车','SRAM Code RSC'],['重量','13.2 kg']]},
  {img:'https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=700&q=85',t:'Specialized Stumpjumper',s:'FACT 11m碳纤维 · 林道之王',tag:'TRAIL',p:'¥45,600',sp:[['车架','FACT 11m 碳纤维'],['前叉','RockShox Pike Ultimate'],['变速','SRAM GX Eagle 12速'],['轮组','Roval Traverse 29'],['刹车','SRAM G2 RSC'],['重量','13.8 kg']]},
  {img:'https://images.unsplash.com/photo-1571068316344-75bc76f77890?w=700&q=85',t:'Santa Cruz Hightower',s:'VPP悬挂 · 全地形征服者',tag:'ALL-MTN',p:'¥52,300',sp:[['车架','C碳纤维 VPP悬挂'],['前叉','Fox 36 Performance Elite'],['变速','Shimano XT 12速'],['轮组','Reserve 30 碳纤维'],['刹车','Shimano XT 四活塞'],['重量','14.0 kg']]},
  {img:'https://images.unsplash.com/photo-1576435728678-68d0fbf94e91?w=700&q=85',t:'Yeti SB150',s:'Switch Infinity · 极限Enduro',tag:'ENDURO',p:'¥72,500',sp:[['车架','Turq 碳纤维'],['前叉','Fox Factory 38 170mm'],['变速','SRAM X01 Eagle AXS'],['轮组','DT Swiss EX 1700'],['刹车','SRAM Code RSC'],['重量','14.1 kg']]},
  {img:'https://images.unsplash.com/photo-1532298229144-0ec0c57515c7?w=700&q=85',t:'Canyon Spectral CF 9',s:'德国工艺 · 全山地利器',tag:'TRAIL',p:'¥39,900',sp:[['车架','CF SLX 碳纤维'],['前叉','RockShox Lyrik Ultimate'],['变速','Shimano XTR 12速'],['轮组','DT Swiss XM 1700'],['刹车','Shimano XTR'],['重量','13.5 kg']]},
  {img:'https://images.unsplash.com/photo-1511994298241-608e28f14fde?w=700&q=85',t:'Pivot Mach 6',s:'DW-Link悬挂 · 竞赛级',tag:'RACE',p:'¥58,200',sp:[['车架','碳纤维 DW-Link'],['前叉','Fox Factory 36'],['变速','SRAM XX1 Eagle AXS'],['轮组','Industry Nine Hydra'],['刹车','SRAM Code RSC'],['重量','13.6 kg']]},
  {img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=700&q=85',t:'Ibis Ripmo V2S',s:'DW-Link · 全能山地',tag:'ALL-MTN',p:'¥49,800',sp:[['车架','碳纤维 DW-Link'],['前叉','Fox 36 Grip2'],['变速','Shimano XT 12速'],['轮组','Ibis S35 碳纤维'],['刹车','Shimano XT'],['重量','13.9 kg']]},
  {img:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=700&q=85',t:'Evil Offering',s:'DELTA悬挂 · 激进几何',tag:'TRAIL',p:'¥55,000',sp:[['车架','碳纤维 DELTA悬挂'],['前叉','Fox 36 Factory'],['变速','SRAM GX Eagle'],['轮组','We Are One Union'],['刹车','SRAM Code R'],['重量','14.2 kg']]},
  {img:'https://images.unsplash.com/photo-1571333250630-f0230c320b6d?w=700&q=85',t:'Orbea Occam M10',s:'OMR碳纤维 · 轻量全能',tag:'TRAIL',p:'¥42,600',sp:[['车架','OMR 碳纤维'],['前叉','Fox 34 Factory'],['变速','Shimano XT 12速'],['轮组','Race Face AR 30'],['刹车','Shimano XT'],['重量','12.8 kg']]},
  {img:'https://images.unsplash.com/photo-1475666675596-cca2035b3d79?w=700&q=85',t:'Norco Range C1',s:'Horst Link · 速降利器',tag:'ENDURO',p:'¥61,000',sp:[['车架','碳纤维 Horst Link'],['前叉','RockShox Zeb Ultimate'],['变速','SRAM X01 Eagle'],['轮组','Stans Flow EX3'],['刹车','SRAM Code RSC'],['重量','14.5 kg']]},
];

var rig=document.getElementById('rig');
var N=data.length,mode='ring',R=380;
var ry=0,rx=8,vy=0,vx=0;
var drag=false,lx=0,ly=0,idle=true,idleTimer;

// 建卡片
data.forEach(function(b,i){
  var d=document.createElement('div');
  d.className='card';
  d.innerHTML='<img src="'+b.img+'" loading="lazy"><div class="shine"></div>'+
    '<div class="tag">'+b.tag+'</div><div class="price">'+b.p+'</div>'+
    '<div class="info"><h3>'+b.t+'</h3><p>'+b.s+'</p></div>';
  d.onclick=function(e){e.stopPropagation();openDetail(i)};
  rig.appendChild(d);
});
var cards=rig.children;

function layout(){
  for(var i=0;i<N;i++){
    var a,x,y,z,r;
    if(mode==='ring'){
      a=(i/N)*Math.PI*2;
      cards[i].style.transform='rotateY('+(a*180/Math.PI)+'deg) translateZ('+R+'px)';
    }else if(mode==='grid'){
      var c=Math.ceil(Math.sqrt(N)),row=Math.floor(i/c),col=i%c;
      x=(col-(c-1)/2)*230; y=(row-(Math.ceil(N/c)-1)/2)*320;
      cards[i].style.transform='translateX('+x+'px) translateY('+y+'px) translateZ(0)';
    }else if(mode==='helix'){
      a=(i/N)*Math.PI*3;
      x=Math.sin(a)*R*0.75; z=Math.cos(a)*R*0.75; y=(i-N/2)*50;
      r=(a*180/Math.PI);
      cards[i].style.transform='translateX('+x+'px) translateY('+y+'px) translateZ('+z+'px) rotateY('+r+'deg)';
    }else if(mode==='flat'){
      x=(i-N/2)*110; y=Math.sin(i*0.7)*40; z=Math.cos(i*0.5)*80;
      r=(i-N/2)*8;
      cards[i].style.transform='translateX('+x+'px) translateY('+y+'px) translateZ('+z+'px) rotateY('+r+'deg)';
    }
  }
}
layout();

// 模式切换
document.getElementById('views').onclick=function(e){
  if(e.target.tagName!=='BUTTON')return;
  mode=e.target.dataset.m;
  for(var b=e.target.parentNode.children,j=0;j<b.length;j++)b[j].classList.remove('on');
  e.target.classList.add('on');
  layout();
};

// 渲染循环
(function loop(){
  if(!drag){
    vy*=0.94;vx*=0.94;
    ry+=vy; rx+=vx;
    if(idle&&Math.abs(vy)<0.05)ry+=0.12;
  }
  rx=Math.max(-50,Math.min(50,rx));
  rig.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg)';
  requestAnimationFrame(loop);
})();

function startIdle(){idle=true}
function stopIdle(){idle=false;clearTimeout(idleTimer);idleTimer=setTimeout(startIdle,5000)}

// 鼠标
document.addEventListener('mousedown',function(e){
  if(document.body.classList.contains('locked'))return;
  drag=true;stopIdle();lx=e.clientX;ly=e.clientY;vy=0;vx=0;
});
document.addEventListener('mousemove',function(e){
  if(!drag)return;
  vy=(e.clientX-lx)*0.28;vx=-(e.clientY-ly)*0.14;
  ry+=vy;rx+=vx;lx=e.clientX;ly=e.clientY;
});
document.addEventListener('mouseup',function(){drag=false});

// 触摸
document.addEventListener('touchstart',function(e){
  if(document.body.classList.contains('locked'))return;
  drag=true;stopIdle();lx=e.touches[0].clientX;ly=e.touches[0].clientY;vy=0;vx=0;
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!drag)return;
  vy=(e.touches[0].clientX-lx)*0.28;vx=-(e.touches[0].clientY-ly)*0.14;
  ry+=vy;rx+=vx;lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(){drag=false});

// 滚轮
document.addEventListener('wheel',function(e){
  e.preventDefault();
  R=Math.max(180,Math.min(650,R+e.deltaY*0.4));
  if(mode==='ring'||mode==='helix')layout();
},{passive:false});

// 详情
var det=document.getElementById('detail');
function openDetail(i){
  var b=data[i];
  document.getElementById('dI').src=b.img;
  document.getElementById('dT').textContent=b.t;
  document.getElementById('dS').textContent=b.s;
  document.getElementById('dP').textContent=b.p;
  var h='';b.sp.forEach(function(s){h+='<div class="cell"><label>'+s[0]+'</label><span>'+s[1]+'</span></div>'});
  document.getElementById('dG').innerHTML=h;
  det.classList.add('open');document.body.classList.add('locked');
  det.scrollTop=0;
}
function closeDet(){det.classList.remove('open');document.body.classList.remove('locked')}
document.getElementById('closeBtn').onclick=closeDet;
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDet()});
</script>
</body>
</html>
